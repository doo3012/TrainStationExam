services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: train-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "P@ssw0rd"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'P@ssw0rd' -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # db-init:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   platform: linux/amd64
  #   container_name: train-db-init
  #   depends_on:
  #     sqlserver:
  #       condition: service_healthy
  #   volumes:
  #     - ./sql-command.sql:/scripts/sql-command.sql:ro
  #   command: >
  #     bash -c "
  #     set -e;
  #     /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'P@ssw0rd' -C -Q \"IF DB_ID('ExamDB') IS NULL CREATE DATABASE ExamDB\";
  #     if /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'P@ssw0rd' -C -d ExamDB -h -1 -W -Q \"SET NOCOUNT ON; IF OBJECT_ID('dbo.TrainSchedules', 'U') IS NULL SELECT 1 ELSE SELECT 0\" | grep -q 1; then
  #       /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'P@ssw0rd' -C -d ExamDB -i /scripts/sql-command.sql;
  #     else
  #       echo 'Database schema already initialized.';
  #     fi
  #     "
  #   restart: "no"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: train-api
    depends_on:
      sqlserver:
        condition: service_healthy
      # db-init:
      #   condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DbConnection: Server=sqlserver,1433;Database=ExamDB;User Id=sa;Password=P@ssw0rd;TrustServerCertificate=True;
    ports:
      - "5074:8080"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TRAIN_STATION_API_URL: http://localhost:5074
    container_name: train-ui
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  sql_data:
